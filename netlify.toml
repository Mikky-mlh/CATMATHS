[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  # APP_URL is just the site URL (not a sensitive secret) and appears in
  # README badges / meta tags, which triggers the secrets scanner.
  # GROQ_API_KEY is consumed only by a Netlify Function (server-side)
  # and is never embedded in the client bundle, but the scanner still
  # flags the env-var name; omitting it prevents false-positive failures.
  SECRETS_SCAN_OMIT_KEYS = "APP_URL,GROQ_API_KEY"
